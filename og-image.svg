      <stop offset="0%" stop-color="#fff8f5"/>
      <stop offset="100%" stop-color="#FFE9DB"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="8" fill="#FF6633"/>
  <text x="80" y="120" font-family="DM Sans, sans-serif" font-size="20" font-weight="800" fill="#C44E15" letter-spacing="3">LEADSPLEASE · DATA API · v1.3.4</text>
