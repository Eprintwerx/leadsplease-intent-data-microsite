name: Deploy static site to S3

# Required GitHub repository secrets:
#   AWS_ACCESS_KEY_ID
#   AWS_SECRET_ACCESS_KEY
#   AWS_REGION
#   S3_BUCKET
# Optional:
#   CLOUDFRONT_DISTRIBUTION_ID   (invalidates /intent-data-microsite/* after sync)

on:
  push:
    branches: [test]
  workflow_dispatch:

concurrency:
  group: deploy-s3-${{ github.ref }}
  cancel-in-progress: true

env:
  S3_PREFIX: intent-data-microsite

jobs:
  deploy:
    name: Sync to S3
    runs-on: ubuntu-latest
    environment: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync hashed Astro assets (immutable, long cache)
        env:
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
        run: |
          aws s3 sync ./_astro "s3://${S3_BUCKET}/${S3_PREFIX}/_astro/" \
            --delete \
            --cache-control "public, max-age=31536000, immutable"

      - name: Sync HTML files (no cache)
        env:
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
        run: |
          aws s3 sync . "s3://${S3_BUCKET}/${S3_PREFIX}/" \
            --exclude "*" \
            --include "*.html" \
            --cache-control "no-store, no-cache, must-revalidate, max-age=0" \
            --content-type "text/html; charset=utf-8"

      - name: Sync other static files (1h cache)
        env:
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
        run: |
          aws s3 cp llms.txt              "s3://${S3_BUCKET}/${S3_PREFIX}/llms.txt"              --cache-control "public, max-age=3600" --content-type "text/plain; charset=utf-8"
          aws s3 cp robots.txt            "s3://${S3_BUCKET}/${S3_PREFIX}/robots.txt"            --cache-control "public, max-age=3600" --content-type "text/plain; charset=utf-8"
          aws s3 cp sitemap.xml           "s3://${S3_BUCKET}/${S3_PREFIX}/sitemap.xml"           --cache-control "public, max-age=3600" --content-type "application/xml; charset=utf-8"
          aws s3 cp manifest.json         "s3://${S3_BUCKET}/${S3_PREFIX}/manifest.json"         --cache-control "public, max-age=3600" --content-type "application/manifest+json"
          aws s3 cp permitted-use.json    "s3://${S3_BUCKET}/${S3_PREFIX}/permitted-use.json"    --cache-control "public, max-age=3600" --content-type "application/json"
          aws s3 cp og-image.svg          "s3://${S3_BUCKET}/${S3_PREFIX}/og-image.svg"          --cache-control "public, max-age=3600" --content-type "image/svg+xml"

      - name: Invalidate CloudFront (optional)
        env:
          CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          if [ -n "$CLOUDFRONT_DISTRIBUTION_ID" ]; then
            aws cloudfront create-invalidation \
              --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" \
              --paths "/${S3_PREFIX}/*"
          else
            echo "CLOUDFRONT_DISTRIBUTION_ID not set — skipping invalidation"
          fi
